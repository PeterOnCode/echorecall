services:
  echorecall:
    build: .
    image: echorecall
    ports:
      # host:container — visit http://localhost:3102 (same port as `pnpm dev`).
      - "3102:3000"
    environment:
      # All server-only; pulled from the project .env, never baked into the image.
      # Provide a key here OR set NUXT_APP_SECRET and add it in the Settings tab (US8) —
      # so the env key is optional rather than required at startup.
      NUXT_OPENAI_API_KEY: ${NUXT_OPENAI_API_KEY:-}
      # 32+ char secret enabling the encrypted in-app OpenAI key (US8); unset → env key only.
      NUXT_APP_SECRET: ${NUXT_APP_SECRET:-}
      # Default tag values are configured in the Settings tab (003), not via env vars.
    volumes:
      # Persist the SQLite DB + generated MP3s across container recreation.
      - ./data:/app/data
    restart: unless-stopped
